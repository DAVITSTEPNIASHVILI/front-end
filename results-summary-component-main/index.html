<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link rel="stylesheet" href="style.css">
  <title>Frontend Mentor | Results summary component</title>
</head>
<body>
  <div id="conteiner">
    <div id="info">
      <div id="score">
        <div id="res">
          <h2>Your Result</h2>
          <div id="circle">
            <h1>76</h1>
            <p>of 100</p>
          </div>
        </div>
        <div id="text">
          <h2>Great</h2>
          <p>You scored higher than 65% of<br>
                 the people who taken<br> 
                          these tests.</p>
        </div>
      </div>
      <div id="summary">
        <div id="info1">
          <div>
            <h2>Summary</h2>
          </div>
          <div id="btns">
            <button class="btns" id="red">
              <div>
                <img src="./assets/images/icon-reaction.svg">
                <p>Reaction</p>
              </div>
              <p>80 <span>/ 100</span></p>
            </button>
            <button class="btns" id="yellow">
              <div>
                <img src="./assets/images/icon-memory.svg">
                <p>Memory</p>
              </div>
              <p>92 <span>/ 100</span></p>
            </button>
            <button class="btns" id="green">
              <div>
                <img src="./assets/images/icon-verbal.svg">
                <p>Verbal</p>
              </div>
              <p>61 <span>/ 100</span></p>
            </button>
            <button class="btns" id="blue">
              <div>
                <img src="./assets/images/icon-visual.svg">
                <p>Visual</p>
              </div>
              <p>73 <span>/ 100</span></p>
            </button>
          </div>
          <button id="btn">Continue</button>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
