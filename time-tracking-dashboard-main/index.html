<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
    <link rel="stylesheet" href="style.css">
    <title>Frontend Mentor | Time tracking dashboard</title>
</head>
<body>
    <div id="conteiner">
        <div id="info">

            <div id="person">
                <div id="jeremy">
                    <div id="for-flex">
                        <div id="for-img">
                            <img src="./images/image-jeremy.png" alt="Jeremy Photo">
                        </div>
                        <p>Report for</p>
                        <h1>Jeremy <br> Robson</h1>
                    </div>
                </div>
                <div id="time">
                    <div id="time2">
                        <p>Daily</p>
                        <p id="white">Weekly</p>
                        <p>Monthly</p>
                    </div>
                </div>
            </div>

            <div id="work">
                <div class="black-bg">
                    <div class="hours">
                        <div class="for-flex2">
                            <h2>Work</h2>
                            <img src="./images/icon-ellipsis.svg">
                        </div>

                        <h2>32 hrs</h2>

                        <p>Last Week - 36 hrs</p>

                    </div>
                </div>
            </div>

            <div id="exercise">
                <div class="black-bg">
                    <div class="hours">
                        <div class="for-flex2">
                            <h2>Exercise</h2>
                            <img src="./images/icon-ellipsis.svg">
                        </div>

                        <h2>4 hrs</h2>

                        <p>Last Week - 5 hrs</p>

                    </div>
                </div>
            </div>

            <div id="play">
                <div class="black-bg">
                    <div class="hours">
                        <div class="for-flex2">
                            <h2>Play</h2>
                            <img src="./images/icon-ellipsis.svg">
                        </div>

                        <h2>10 hrs</h2>

                        <p>Last Week - 8 hrs</p>

                    </div>
                </div>
            </div>

            <div id="social">
                <div class="black-bg">
                    <div class="hours">
                        <div class="for-flex2">
                            <h2>Social</h2>
                            <img src="./images/icon-ellipsis.svg">
                        </div>

                        <h2>5 hrs</h2>

                        <p>Last Week - 10 hrs</p>

                    </div>
                </div>
            </div>

            <div id="study">
                <div class="black-bg">
                    <div class="hours">
                        <div class="for-flex2">
                            <h2>Study</h2>
                            <img src="./images/icon-ellipsis.svg">
                        </div>

                        <h2>4 hrs</h2>

                        <p>Last Week - 7 hrs</p>

                    </div>
                </div>
            </div>

            <div id="self-care">
                <div class="black-bg">
                    <div class="hours">
                        <div class="for-flex2">
                            <h2>Self Care</h2>
                            <img src="./images/icon-ellipsis.svg">
                        </div>

                        <h2>2 hrs</h2>

                        <p>Last Week - 2 hrs</p>

                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
