<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link rel="stylesheet" href="style.css">
  <title>Frontend Mentor | Newsletter sign-up form with success message</title>
</head>
<body>
  <div id="container">
    <div id="info">
      <div id="child-info">
          <div id="div1">
            <h1>Stay updated!</h1>
            <p>Join 60,000+ product managers receiving monthly <br>
              updates on:</p>
            <div id="main-div">
              <div class="divs">
                <img src="./assets/images/icon-list.svg">
                <p>Product discovery and building what matters</p>
              </div>
              <div class="divs">
                <img src="./assets/images/icon-list.svg">
                <p>Measuring to ensure updates are a success</p>
              </div>
              <div class="divs">
                <img src="./assets/images/icon-list.svg">
                <p>And much more!</p>
              </div>
            </div>
            <div id="form">
              <label for="email_address">Email address</label> <br>
              <input type="email" id="email_address" placeholder="email@company.com">
              <button id="btn">Subscribe to monthly newsletter</button>
            </div>
          </div>
          <div id="div2">
            <img src="./assets/images/illustration-sign-up-desktop.svg">
          </div>
      </div>
    </div>
  </div>
</body>
</html>
